# Конфигурация Alembic. DSN берётся из app.config (DatabaseConfig) в migrations/env.py,
# поэтому sqlalchemy.url здесь пустой. Переопределить: alembic -x dsn=postgresql+asyncpg://...

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Человекочитаемые имена файлов миграций: yyyymmdd_<slug>. revision id ВНУТРИ файла
# остаётся hex (его хватает Alembic для связей down_revision/alembic_version);
# дата в имени — для людей. %% — экранирование для configparser.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(slug)s
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
