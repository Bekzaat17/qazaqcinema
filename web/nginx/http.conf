# Nginx БЕЗ TLS (:80). Используется локально и в проде ДО получения сертификата
# (обслуживает ACME-челлендж, чтобы certbot смог его выпустить). Вебхука здесь нет —
# Telegram шлёт апдейты только по HTTPS (см. https.conf.template).
server {
    listen 80;
    server_name _;

    # ACME webroot-челлендж (certbot). Должен работать ДО того, как появится сертификат.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # SPA: любой неизвестный путь отдаём index.html (клиентский роутинг).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # API → api-контейнер. proxy_pass без пути сохраняет исходный URI (/api/...).
    location /api/ {
        client_max_body_size 12m;          # чек Kaspi (/api/payments/proof) до 10 МБ
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Постеры (StaticFiles на api).
    location /posters/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
}
