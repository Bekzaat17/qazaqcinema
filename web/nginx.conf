# Прод-nginx фронта: статика SPA + reverse-proxy на FastAPI (тот же origin → без CORS).
# TLS/домен добавятся в Фазе 10; сейчас слушаем :80 (доступ по IP VPS).
server {
    listen 80;
    server_name _;

    # SPA: любой неизвестный путь отдаём index.html (клиентский роутинг).
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # API → api-контейнер. proxy_pass без пути сохраняет исходный URI (/api/...).
    location /api/ {
        client_max_body_size 12m;          # чек Kaspi (/api/payments/proof) до 10 МБ
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Постеры (StaticFiles на api). В «большом» проде их отдаёт сам nginx с диска.
    location /posters/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }
}
