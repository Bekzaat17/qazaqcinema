# QazaqCinema — ЕДИНАЯ топология для всех сред (dev / prod / test).
#
# Принцип 12-factor: dev и prod — один и тот же стек, отличие ТОЛЬКО в env-файле.
# Запускать через ./start.sh (он подставляет env-файл режима через ENV_FILE + --env-file).
#
#   ./start.sh        → ENV_FILE=.env       (локально)
#   ./start.sh prod   → ENV_FILE=.env.prod  (те же контейнеры, другой env)
#   ./start.sh test   → ENV_FILE=.env.test  (профиль test: pytest в контейнере)
#
# Порты БД/Redis/API публикуются на 127.0.0.1 (доступны хосту для инструментов/host-venv,
# но не наружу); web (Caddy) — на :80/:443. Одинаково во всех средах → «отличие только в env».
name: qazaqcinema

# Общий build рантайм-сервисов (api/bot/migrate) — стадия runtime образа.
x-app-build: &app-build
  context: .
  target: runtime

# Логи ВСЕХ сервисов: json-file с ротацией по РАЗМЕРУ (Docker не умеет ротацию по времени).
# 10 МБ × 3 файла = ≤30 МБ на сервис. При нашем трафике это перекрывает 3 месяца с запасом,
# а диск не заполнится в любом случае. Нужно хранить дольше — подними max-file.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-qazaqcinema}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qazaqcinema}
      POSTGRES_DB: ${DB_NAME:-qazaqcinema}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M      # БД: с запасом под лёгкую нагрузку (shared_buffers по умолчанию 128М)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-qazaqcinema}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 192M      # сессии/кэш/очередь — крошечные; лимит с большим запасом
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Одноразовый прогон миграций ПЕРЕД api/bot (оба ждут его успешного выхода) →
  # свежая БД всегда получает схему автоматически.
  migrate:
    build: *app-build
    env_file: ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres        # имя сервиса в сети compose (перекрывает DB_HOST из env-файла)
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M      # одноразовый: alembic, живёт секунды

  api:
    build: *app-build
    env_file: ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads:/app/uploads   # постеры: пишет бот (/add), раздаёт api (StaticFiles)
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 384M      # uvicorn+FastAPI+SQLAlchemy; под лёгкой нагрузкой ~150М

  bot:
    build: *app-build
    env_file: ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # polling (dev) или webhook (прод) — выбор в app.main по схеме PUBLIC_ORIGIN (https ⟹ webhook).
    # В webhook-режиме бот слушает :8080 внутри сети compose; Caddy (web) проксирует /tg/ на bot:8080.
    command: python -m app.main
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 384M      # aiogram-бот; под лёгкой нагрузкой ~150М

  # Worker рассылок (Фаза 12): забирает задания из Redis-очереди и шлёт через Bot API,
  # соблюдая лимит Telegram (~30 msg/s) в одном месте. Отдельный процесс — не блокирует
  # бота/API; очередь crash-safe (recover при старте). Тот же образ/env, что api/bot.
  # ⚠️ РОВНО ОДИН worker: очередь single-consumer (recover переносит ВСЁ processing→pending),
  # реплики/масштаб → двойная отправка. Горизонтально — только через Streams+consumer-group.
  worker:
    build: *app-build
    env_file: ${ENV_FILE:-.env}
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m app.worker
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M      # воркер рассылок; в простое ~110М

  # Фронт + reverse-proxy + АВТО-TLS: Caddy. Собирает SPA (node), раздаёт статику и
  # проксирует /api, /posters, /tg/ на api/bot (единый origin, CORS не нужен). HTTPS —
  # автоматический: Caddy сам выпускает и продлевает сертификат Let's Encrypt (никакого
  # certbot/cron). Дев/прод различаются ТОЛЬКО значением PUBLIC_ORIGIN (та же переменная,
  # что задаёт CORS/URL Mini App): http://localhost → HTTP :80; https://домен → авто-TLS :443.
  web:
    build:
      context: ./web
    # Секреты приложения в Caddy НЕ пробрасываем — только публичный адрес и e-mail для ACME.
    environment:
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      ACME_EMAIL: ${ACME_EMAIL:-test@testmail.com}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"                   # TLS; локально (http://localhost) Caddy на 443 не слушает — хармлесс
    volumes:
      - caddy_data:/data            # сертификаты + ACME-аккаунт (переживают пересборку/git pull)
      - caddy_config:/config
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M      # Caddy: статика + reverse-proxy, ~30М

  # Тесты (профиль test — в обычный up НЕ попадает). Запуск: ./start.sh test.
  # Гоняет ruff+mypy+pytest в контейнере (образ-стадия test) против postgres compose.
  test:
    build:
      context: .
      target: test
    env_file: ${ENV_FILE:-.env.test}
    environment:
      DB_HOST: postgres
      # ЯВНО (не через env_file — `compose run` его не применяет): тесты идут в ИЗОЛИРОВАННУЮ
      # тест-БД, а не в рабочую. Имя на `_test` — иначе conftest-guard откажется чистить данные.
      DB_NAME: qazaqcinema_test
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "ruff check app tests && mypy app && pytest"
    profiles: ["test"]

volumes:
  pgdata:
  uploads:
  caddy_data:      # TLS-сертификаты Let's Encrypt + ACME-аккаунт (авто-выпуск/продление Caddy)
  caddy_config:
